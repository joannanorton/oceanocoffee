<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title>Joanna Coffee Farm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #111b29;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
        }
        main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #fff;
            overflow: hidden;
        }
        .scrollDist {
            width: 100%;
            height: 300vh;
        }
        svg {
            width: 100%;
            height: 100%;
            /* This ensures the SVG fills the screen like a background-cover */
            display: block;
        }
        text {
            font-size: 50px;
            text-anchor: middle;
            user-select: none;
        }
        @media (max-width: 600px) {
            text { 
                font-size: 30px;
            }
        }
    </style>
</head>
<body>
    <div class="scrollDist"></div>
    <main>
        <!-- preserveAspectRatio="xMidYMid slice" is the key for mobile fitting -->
        <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
            <mask id="m">
                <g class="cloud1">
                    <rect fill="#fff" width="100%" height="801" y="799" />
                    <image xlink:href="https://assets.codepen.io/721952/cloud1Mask.jpg" width="1200" height="800"/>
                </g>
            </mask>
            <image class="sky" xlink:href="https://assets.codepen.io/721952/sky.jpg"  width="1200" height="590" />
            <image class="mountBg" xlink:href="https://raw.githubusercontent.com/joannanorton/oceanocoffee/refs/heads/main/img/gunungtengah.png" width="1200" height="800"/>    
            <image class="mountMg" xlink:href="https://raw.githubusercontent.com/joannanorton/oceanocoffee/refs/heads/main/img/gunungkanan.png" width="1200" height="800"/>    
            <image class="cloud2" xlink:href="https://assets.codepen.io/721952/cloud2.png" width="1200" height="800"/>    
            <image class="mountFg" xlink:href="https://raw.githubusercontent.com/joannanorton/oceanocoffee/refs/heads/main/img/gunungkiri.png" width="1200" height="800"/>
            <image class="cloud1" xlink:href="https://assets.codepen.io/721952/cloud1.png" width="1200" height="800"/>
            <image class="cloud3" xlink:href="https://assets.codepen.io/721952/cloud3.png" width="1200" height="800"/>
            <text fill="#fff" x="600" y="200">From the Mountains</text>
            <g mask="url(#m)">
                <rect fill="#fff" width="100%" height="100%" />      
                <text x="600" y="200" fill="#162a43">Joanna Coffee Farm</text>
            </g>
        </svg>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);

        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: '.scrollDist',
                start: 'top top',
                end: 'bottom bottom',
                scrub: 1
            }
        });

        tl.fromTo('.sky', {y:0},{y:-200}, 0)
          .fromTo('.cloud1', {y:100},{y:-800}, 0)
          .fromTo('.cloud2', {y:-150},{y:-500}, 0)
          .fromTo('.cloud3', {y:-50},{y:-650}, 0)
          .fromTo('.mountBg', {y:-10},{y:-100}, 0)
          .fromTo('.mountMg', {y:-30},{y:-250}, 0)
          .fromTo('.mountFg', {y:-50},{y:-600}, 0);
        
        document.querySelector('#arrow-btn').addEventListener('click', () => {
            // Reliable scroll destination for mobile
            gsap.to(window, {scrollTo: {y: ".scrollDist", autoKill: false, position: "bottom"}, duration: 1.5});
        });
    </script>
</body>
</html>
