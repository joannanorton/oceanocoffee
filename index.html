<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Joanna Coffee Farm</title>
    <!-- Optimized viewport for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #111b29;
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: #fff;
            overflow: hidden;
        }
        .scrollDist {
            width: 100%;
            height: 300vh; /* Control scroll length here */
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        /* Mobile-friendly Text sizing */
        text {
            font-size: 50px;
            text-anchor: middle;
            user-select: none;
        }
        @media (max-width: 600px) {
            text { 
                font-size: 32px; /* Smaller text for mobile */
            }
        }
        /* Hardware acceleration for smooth mobile parallax */
        .sky, .mountBg, .mountMg, .cloud1, .cloud2, .cloud3, .mountFg {
            will-change: transform;
        }
    </style>
</head>
<body>
    <div class="scrollDist"></div>
    <main>
        <!-- preserveAspectRatio="xMidYMid slice" acts like background-size: cover -->
        <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
            <mask id="m">
                <g class="cloud1">
                    <rect fill="#fff" width="100%" height="801" y="799"></rect>
                    <image xlink:href="https://assets.codepen.io/721952/cloud1Mask.jpg" width="1200" height="800"></image>
                </g>
            </mask>
            <image class="sky" xlink:href="https://assets.codepen.io/721952/sky.jpg" width="1200" height="590"></image>
            <image class="mountBg" xlink:href="https://raw.githubusercontent.com/joannanorton/oceanocoffee/refs/heads/main/img/gunungtengah.png" width="1200" height="800"></image>    
            <image class="mountMg" xlink:href="https://raw.githubusercontent.com/joannanorton/oceanocoffee/refs/heads/main/img/gunungkanan.png" width="1200" height="800"></image>    
            <image class="cloud2" xlink:href="https://assets.codepen.io/721952/cloud2.png" width="1200" height="800"></image>    
            <image class="mountFg" xlink:href="https://raw.githubusercontent.com/joannanorton/oceanocoffee/refs/heads/main/img/gunungkiri.png" width="1200" height="800"></image>
            <image class="cloud1" xlink:href="https://assets.codepen.io/721952/cloud1.png" width="1200" height="800"></image>
            <image class="cloud3" xlink:href="https://assets.codepen.io/721952/cloud3.png" width="1200" height="800"></image>
            
            <text fill="#fff" x="600" y="200">From the Mountains</text>
            <g mask="url(#m)">
                <rect fill="#fff" width="100%" height="100%"></rect>      
                <text x="600" y="200" fill="#162a43">Joanna Coffee Farm</text>
            </g>
        </svg>
    </main>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollToPlugin.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger, ScrollToPlugin);

        // Mobile-optimized timeline
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: '.scrollDist',
                start: 'top top',
                end: 'bottom bottom',
                scrub: 1 // Lower scrub value (e.g. 1) is smoother on mobile
            }
        });

        tl.fromTo('.sky', {y:0},{y:-200}, 0)
          .fromTo('.cloud1', {y:100},{y:-800}, 0)
          .fromTo('.cloud2', {y:-150},{y:-500}, 0)
          .fromTo('.cloud3', {y:-50},{y:-650}, 0)
          .fromTo('.mountBg', {y:-10},{y:-100}, 0)
          .fromTo('.mountMg', {y:-30},{y:-250}, 0)
          .fromTo('.mountFg', {y:-50},{y:-600}, 0);
        
        // Safety check for interaction buttons
        const arrowBtn = document.querySelector('#arrow-btn');
        if (arrowBtn) {
            arrowBtn.addEventListener('click', () => {
                gsap.to(window, {scrollTo: {y: ".scrollDist", autoKill: false}, duration: 1.5});
            });
        }
    </script>
</body>
</html>
