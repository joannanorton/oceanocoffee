<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Joanna Coffee Farm</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: #111b29;
            font-family: 'Montserrat', sans-serif;
        }
        main {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            /* Allow scroll to pass through to the scrollDist below */
            pointer-events: none; 
            z-index: 1;
        }
        .scrollDist {
            width: 100%;
            height: 300vh;
            position: relative;
            z-index: 0;
        }
        svg {
            width: 100%;
            height: 100%;
            display: block;
            pointer-events: auto; /* Re-enable clicks for the SVG content */
        }
        text {
            font-size: 50px;
            text-anchor: middle;
            user-select: none;
        }
        @media (max-width: 600px) {
            text { font-size: 30px; }
        }
        /* Performance boost */
        .sky, .mountBg, .mountMg, .cloud1, .cloud2, .cloud3, .mountFg {
            will-change: transform;
        }
    </style>
</head>
<body>
    <div class="scrollDist"></div>
    <main>
        <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
            <mask id="m">
                <g class="cloud1">
                    <rect fill="#fff" width="100%" height="801" y="799"></rect>
                    <image href="https://assets.codepen.io/721952/cloud1Mask.jpg" width="1200" height="800"></image>
                </g>
            </mask>
            <image class="sky" href="https://assets.codepen.io/721952/sky.jpg" width="1200" height="590"></image>
            <image class="mountBg" href="https://raw.githubusercontent.com/joannanorton/oceanocoffee/refs/heads/main/img/gunungtengah.png" width="1200" height="800"></image>    
            <image class="mountMg" href="https://raw.githubusercontent.com/joannanorton/oceanocoffee/refs/heads/main/img/gunungkanan.png" width="1200" height="800"></image>    
            <image class="cloud2" href="https://assets.codepen.io/721952/cloud2.png" width="1200" height="800"></image>    
            <image class="mountFg" href="https://raw.githubusercontent.com/joannanorton/oceanocoffee/refs/heads/main/img/gunungkiri.png" width="1200" height="800"></image>
            <image class="cloud1" href="https://assets.codepen.io/721952/cloud1.png" width="1200" height="800"></image>
            <image class="cloud3" href="https://assets.codepen.io/721952/cloud3.png" width="1200" height="800"></image>
            <text fill="#fff" x="600" y="200">From the Mountains</text>
            <g mask="url(#m)">
                <rect fill="#fff" width="100%" height="100%"></rect>      
                <text x="600" y="200" fill="#162a43">Joanna Coffee Farm</text>
            </g>
        </svg>
    </main>

    <!-- Load GSAP from a reliable CDN -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.2/dist/ScrollTrigger.min.js"></script>

    <script>
        // Ensure scripts are loaded before running
        window.onload = function() {
            if (typeof gsap !== 'undefined') {
                gsap.registerPlugin(ScrollTrigger);

                const tl = gsap.timeline({
                    scrollTrigger: {
                        trigger: '.scrollDist',
                        start: 'top top',
                        end: 'bottom bottom',
                        scrub: 0.5 // Reduced for smoother mobile response
                    }
                });

                tl.fromTo('.sky', {y:0},{y:-200}, 0)
                  .fromTo('.cloud1', {y:100},{y:-800}, 0)
                  .fromTo('.cloud2', {y:-150},{y:-500}, 0)
                  .fromTo('.cloud3', {y:-50},{y:-650}, 0)
                  .fromTo('.mountBg', {y:-10},{y:-100}, 0)
                  .fromTo('.mountMg', {y:-30},{y:-250}, 0)
                  .fromTo('.mountFg', {y:-50},{y:-600}, 0);
            } else {
                console.error("GSAP failed to load. Check your internet connection or CDN links.");
            }
        };
    </script>
</body>
</html>
